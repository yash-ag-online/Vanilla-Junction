<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Junction - Account</title>
    <link rel="shortcut icon" href="./images/logo.png" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="account.css">
</head>

<body>
    <div id="root" class="root">
        <!-- Header -->
        <header>
            <a href="index.html" class="logo">
                <img src="./images/logo.png" alt="Vanilla Junction Logo">
                <p>Vanilla Junction</p>
            </a>

            <nav>
                <ul class="nav-list">
                    <li>
                        <a href="cart.html" class="button"><img src="./icons/cart.svg" class="icon"
                                alt="cart icon"><span class="text">Cart</span><span class="cart-quantity"></span></a>
                    </li>
                    <li>
                        <a href="account.html" class="button"><img src="./icons/account.svg" class="icon"
                                alt="account icon"><span class="text">Account</span></a>
                    </li>
                </ul>
            </nav>
        </header>

        <!-- Main -->
        <main>
            <div class="account-details">
                <span class="account-phone"></span>
                <div class="saved-address"></div>
            </div>

            <div class="order-history-container">
                <h3>Your Order History:</h3>

                <div class="order-history">
                    <!-- Order History Cards -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; Yash Agrawal | Full-stack software engineer</p>
            <a href="https://github.com/yash-ag-online" target="_blank" class="icon-link"><img src="./icons/github.svg"
                    class="icon" alt="github icon"></a>
        </footer>
    </div>

    <!-- JS -->
    <script src="./global.js"></script>
    <script src="./account.js"></script>
</body>

</html>
